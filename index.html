  <body>
    <div class="bg-stars" aria-hidden="true"></div>

    <main class="wrap">
      <section class="card hero" aria-labelledby="hero-title">
        <p class="est">totally accurate</p>
        <h1 id="hero-title">ultimate compatibility test...</h1>
        <p class="hero-sub">
          type two osu! usernames and the test will show how compatible you two are..
          <br /><br />
          if you get a 0% u need to fist fight the other to the death
        </p>

        <form id="analyze-form" novalidate>
          <div class="compat-form-grid">
            <div class="analyze-row">
              <input
                type="text"
                id="username-a"
                name="username_a"
                autocomplete="username"
                placeholder="ex. soft kitten"
                maxlength="64"
              />
            </div>

            <button type="submit" class="find-out-btn">find out</button>

            <div class="analyze-row">
              <input
                type="text"
                id="username-b"
                name="username_b"
                autocomplete="off"
                placeholder="ex. celybi"
                maxlength="64"
              />
            </div>
          </div>

          <p id="form-error" class="error" hidden></p>
        </form>
      </section>

      <section id="result-section" class="card" hidden aria-live="polite">
        <p class="verdict-label">compatibility for</p>
        <p id="res-pair" class="verdict-pair"></p>
        <p id="verdict-line" class="verdict-line"></p>

        <p class="verdict-percent-sub">0% = enemies · 100% = soulmates</p>

        <p id="verdict-blurb" class="verdict-blurb" hidden></p>

        <div class="profile-link-wrap">
          <a id="osu-profile-link-a" href="#" target="_blank" rel="noopener noreferrer"></a>
          <a id="osu-profile-link-b" href="#" target="_blank" rel="noopener noreferrer"></a>
        </div>

        <button type="button" class="secondary-btn" id="copy-btn">copy verdict</button>
      </section>
    </main>

    <footer class="site-footer">
      <p>✿ not affiliated with osu! ✿</p>
